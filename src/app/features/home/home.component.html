<section
  class="flex justify-center items-center mx-auto max-w-full px-2 pt-20 h-fit min-h-96"
>
  <div class="w-[600px] h-auto justify-self-center text-center">
    <h1 class="font-bold text-5xl leading-10 tracking-tighter mb-4">
      Anderson Gomes
    </h1>
    <p class="font-bold text-2xl leading-8 mb-2">
      <span class="text-[var(--color-dark)]">Engenheiro de Software Sênior</span>
    </p>
    <p class="text-lg leading-7 mb-8">
      Arquiteto de sistemas Java/Spring. Construí o SaaS de gestão de energia
      usado por Energisa, Cemig, Celesc e Neoenergia.
    </p>
    <div class="flex gap-4 justify-center">
      <a
        href="https://www.linkedin.com/in/devanderson/"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-block px-6 py-3 bg-[var(--color-primary)] text-white rounded-lg font-bold hover:opacity-90 transition-opacity"
      >
        LinkedIn
      </a>
      <a
        routerLink="/portifolio"
        class="inline-block px-6 py-3 border-2 border-[var(--color-primary)] text-[var(--color-primary)] rounded-lg font-bold hover:bg-[var(--color-primary)] hover:text-white transition-colors"
      >
        Portfólio
      </a>
    </div>
  </div>
</section>
